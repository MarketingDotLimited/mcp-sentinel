version: '3.8'
services:
  mcp-sentinel:
    build: .
    ports:
      - "4444:4444"
    environment:
      - PORT=4444
      - HOST=0.0.0.0
      - USE_HTTPS=false
      - JWT_SECRET=change_this_to_a_random_64_character_string_for_security_1234567890
      - ADMIN_API_KEY=mcp_dev_key_123
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./db_connections.json:/app/db_connections.json
