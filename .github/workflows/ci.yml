name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality (Lint & Format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Verify reproducible release bundle
        run: |
          MCP_ALLOW_UNSIGNED_RELEASE=true npm run release:bundle
          first_hash="$(cut -d' ' -f1 dist/mcp-sentinel-*.sha256)"
          MCP_ALLOW_UNSIGNED_RELEASE=true npm run release:bundle
          second_hash="$(cut -d' ' -f1 dist/mcp-sentinel-*.sha256)"
          test "$first_hash" = "$second_hash"
          tar -tzf dist/mcp-sentinel-*.tar.gz | grep -q 'mcp-sentinel-.*\/authelia\/configuration.template.yml'
          if tar -tzf dist/mcp-sentinel-*.tar.gz | grep -Eq 'authelia\/(configuration|users|user-mappings)\.(yml|json)|oidc_.*\.pem|\.sqlite3?$'; then
            echo 'Release archive contains runtime state or credentials.' >&2
            exit 1
          fi

      - name: Check for secrets in code
        run: |
          if grep -rniE "password\s*=\s*['\"].+" --exclude-dir=node_modules .; then
            echo "❌ Possible hardcoded password found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests with Coverage
        run: npm run test:coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: matrix.node-version == '22.x'
        with:
          name: coverage-report
          path: coverage/

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Live MCP E2E Test
        run: sudo env "PATH=$PATH" npm run test:live

      - name: Run UI E2E Test
        run: npm run test:ui

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-artifacts
          path: .playwright-mcp/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2

      - name: Verify secrets with TruffleHog
        uses: trufflesecurity/trufflehog@a2ef4f51a5e3644c500f02650db88504cd7d9b68 # main, pinned 2026-07-23
        with:
          extra_args: --only-verified

      - name: Verify required files exist
        run: |
          for f in LICENSE SECURITY.md CONTRIBUTING.md CHANGELOG.md .env.example; do
            [ -f "$f" ] || (echo "❌ Missing: $f" && exit 1)
          done
          echo "✅ All required files present"
