name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-check:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check syntax — all modules
        run: |
          node --check server.js
          node --check security.js
          node --check audit.js
          node --check keygen.js
          node --check setup.js
          node --check tools/system.js
          node --check tools/files.js
          node --check tools/services.js
          node --check tools/users.js
          echo "✅ All files passed syntax check"

      - name: Check for secrets in code
        run: |
          # Fail if any hardcoded secrets patterns found
          if grep -rn "password\s*=\s*['\"].\+" --include="*.js" .; then
            echo "❌ Possible hardcoded password found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Check .env is gitignored
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "❌ .env is tracked by git!"
            exit 1
          fi
          echo "✅ .env is properly gitignored"

      - name: Verify required files exist
        run: |
          for f in LICENSE SECURITY.md CONTRIBUTING.md CHANGELOG.md .env.example; do
            [ -f "$f" ] || (echo "❌ Missing: $f" && exit 1)
          done
          echo "✅ All required files present"
